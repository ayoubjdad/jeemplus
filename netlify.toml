# Netlify: clear “Build settings” overrides in the dashboard if present, or this file is ignored.
# Expect: build command `pnpm install && pnpm run build` (or `corepack enable && pnpm install && pnpm run build`), publish `dist`.

[build]
  command = "pnpm run build"
  publish = "dist"

# SofaScore: Node Functions still get 403 (TLS/bot checks). Edge Function (Deno) tries Sofascore directly,
# then optional SOFA_HTTP_BRIDGE (your backend with curl_cffi / browser-like TLS).
[[edge_functions]]
  path = "/sofa-api/*"
  function = "sofa-proxy"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
