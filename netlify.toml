# Netlify: clear “Build settings” overrides in the dashboard if present, or this file is ignored.
# Expect: build command `pnpm install && pnpm run build` (or `corepack enable && pnpm install && pnpm run build`), publish `dist`.

[build]
  command = "pnpm run build"
  publish = "dist"

# Proxy SofaScore API — browser calls stay same-origin (`/sofa-api/...`), Netlify forwards server-side (no CORS).
[[redirects]]
  from = "/sofa-api/*"
  to = "https://www.sofascore.com/api/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
