# Netlify: clear “Build settings” overrides in the dashboard if present, or this file is ignored.
# Expect: build command `pnpm install && pnpm run build` (or `corepack enable && pnpm install && pnpm run build`), publish `dist`.

[build]
  command = "pnpm run build"
  publish = "dist"

# SofaScore JSON: edge rewrite to sofascore.com often returns 403 — use a function with browser-like headers.
[[redirects]]
  from = "/sofa-api/*"
  to = "/.netlify/functions/sofa-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
