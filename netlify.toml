# Netlify: clear “Build settings” overrides in the dashboard if present, or this file is ignored.
# Expect: build command `pnpm install && pnpm run build` (or `corepack enable && pnpm install && pnpm run build`), publish `dist`.

[build]
  command = "pnpm run build"
  publish = "dist"

# SofaScore JSON: Netlify Edge + ordinary fetch usually get 403 (Akamai/TLS fingerprinting against datacenter IPs).
# This function retries with curl's OpenSSL JA3 where possible and uses TheSportsDB for football schedules as fallback.
[[redirects]]
  force = true
  from = "/sofa-api/*"
  to = "/.netlify/functions/sofascore-fetch"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
